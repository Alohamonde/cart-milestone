# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration

name = "Cart Milestone"
client_id = ""
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,write_discounts,read_discounts"

[shop.metafields.app.cart_milestone]
type = "json"
name = "Cart Milestone Config"
description = "Cart milestone tiers, free shipping threshold, and bar settings"

  [shop.metafields.app.cart_milestone.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[app_proxy]
url = "/apps/cart-milestone"
subpath = "cart-milestone"
prefix = "apps"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[auth]
redirect_urls = ["https://shopify.dev/apps/default-app-home/api/auth"]
